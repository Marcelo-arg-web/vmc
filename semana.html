<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Semana — Planificador VMC</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="topbar">
    <div class="container nav">
      <div class="brand">
        <span id="appName">Planificador VMC</span>
        <span class="badge" id="appVersion"></span>
        <span class="badge" id="authStatus">—</span>
      </div>
      <div class="navlinks">
        <a href="index.html">Inicio</a>
        <a href="semana.html">Semana</a>
        <a href="personas.html">Personas</a>
        <a href="tablero.html">Tablero</a>
        <a href="settings.html">Configuración</a>
        <a href="login.html">Login</a>
        <button id="btnLogout" class="ghost" style="display:none">Salir</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <div class="row space">
        <div>
          <h2>Semana</h2>
          <div class="small">Fecha: <b id="weekPretty">—</b></div>
        </div>
        <input id="weekISO" type="date" />
      </div>

      <div class="grid cols-3" style="margin-top:12px">
        <div>
          <div class="small">Día</div>
          <input id="meetingDay" style="width:100%" placeholder="jueves" />
        </div>
        <div>
          <div class="small">Hora</div>
          <input id="meetingTime" style="width:100%" placeholder="19:30" />
        </div>
        <div>
          <div class="small">Tipo de semana</div>
          <select id="weekType" style="width:100%">
            <option value="normal">Normal</option>
            <option value="visita">Visita del viajante</option>
            <option value="asamblea">Asamblea</option>
            <option value="conmemoracion">Conmemoración</option>
            <option value="sin_reunion">Sin reunión</option>
          </select>
        </div>
      </div>

      <div class="grid cols-2" style="margin-top:12px">
        <div>
          <div class="small">Link WOL</div>
          <input id="wolLink" style="width:100%" placeholder="https://wol.jw.org/..." />
        </div>
        <div>
          <div class="small">Motivo / observación especial</div>
          <input id="specialReason" style="width:100%" placeholder="Asamblea, conmemoración, semana especial..." />
        </div>
      </div>

      <div class="grid cols-3" style="margin-top:12px">
        <div>
          <div class="small">Lectura bíblica</div>
          <input id="reading" style="width:100%" />
        </div>
        <div>
          <div class="small">Canción inicial</div>
          <input id="openingSong" style="width:100%" />
        </div>
        <div>
          <div class="small">Canción intermedia</div>
          <input id="middleSong" style="width:100%" />
        </div>
      </div>

      <div class="grid cols-3" style="margin-top:12px">
        <div>
          <div class="small">Canción final</div>
          <input id="closingSong" style="width:100%" />
        </div>
        <div>
          <div class="small">Viajante</div>
          <input id="travelerName" style="width:100%" placeholder="Roberto Armando" />
        </div>
        <div>
          <div class="small">Título del discurso del viajante</div>
          <input id="travelerTalkTitle" style="width:100%" placeholder="Discurso de servicio del viajante" />
        </div>
      </div>

      <div class="row" style="margin-top:12px">
        <button id="btnLoadWOL">Cargar programa desde WOL</button>
        <button id="btnSuggest" class="secondary">Sugerir asignados</button>
        <button id="btnSave" class="success">Guardar semana</button>
        <button id="btnToBoard" class="ghost">Ver tablero</button>
      </div>
      <div id="msg" class="notice" style="display:none; margin-top:10px"></div>
      <div class="small" id="status" style="margin-top:10px">—</div>
    </div>

    <div class="grid cols-2" style="margin-top:14px">
      <div class="card">
        <h2>Programa detectado</h2>
        <div id="partsBox"></div>
      </div>
      <div class="card">
        <h2>Asignaciones</h2>
        <div id="asgBox"></div>
      </div>
    </div>
  </div>

  <script type="module" src="js/semana.js"></script>
</body>
</html>
