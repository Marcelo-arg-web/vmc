<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Planificador VMC</title>
  <link rel="stylesheet" href="css/styles.css" />
  
</head>
<body>
  <div class="topbar">
    <div class="container nav">
      <div class="brand">
        <span id="appName">Planificador VMC</span>
        <span class="badge" id="appVersion"></span>
        <span class="badge" id="authStatus">—</span>
      </div>
      <div class="navlinks">
        <a href="index.html">Inicio</a>
        <a href="semana.html">Semana</a>
        <a href="personas.html">Personas</a>
        <a href="tablero.html">Tablero</a>
        <a href="settings.html">Configuración</a>
        <a href="login.html">Login</a>
        <button id="btnLogout" class="ghost" style="display:none">Salir</button>
      </div>
    </div>
  </div>

  <div class="container">
    
<div class="card">
  <h2>Login</h2>
  <p>Iniciá sesión con un usuario creado en Firebase Authentication (Email/Password).</p>
  <div class="grid cols-2">
    <div>
      <div class="small">Email</div>
      <input id="email" type="email" placeholder="tu@email.com" style="width:100%" />
    </div>
    <div>
      <div class="small">Contraseña</div>
      <input id="password" type="password" placeholder="••••••••" style="width:100%" />
    </div>
  </div>
  <div class="row" style="margin-top:10px">
    <button id="btnLogin">Entrar</button>
    <div id="msg" class="small" style="color:#dc2626"></div>
  </div>
</div>

    <footer>
      <div>Consejo: guardá la semana antes de pasar a otra. Si ves “No guardado”, no cambies de semana hasta guardar.</div>
    </footer>
  </div>

  
  <script type="module" src="js/login.js"></script>
</body>
</html>
