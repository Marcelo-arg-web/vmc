<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Programa mensual · Villa Fiad</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="css/styles.css" />

  <style>
    /* Hoja A4 (pantalla + impresión) */
    .a4-shell{max-width:980px;margin:0 auto;}
    .a4-sheet{
      width:210mm;
      min-height:297mm;
      margin:14px auto 22px;
      background:#fff;
      border:1px solid rgba(0,0,0,.12);
      box-shadow:0 12px 30px rgba(0,0,0,.10);
      border-radius:10px;
      overflow:hidden;
    }
    .a4-pad{padding:10mm 10mm 12mm;}

    /* Programa mensual estilo "tabla" (como el modelo) */
    .pm-wrap{max-width:190mm;margin:0 auto;}
    .month-banner{border:1px solid #888;border-bottom:none;border-radius:0;overflow:hidden;margin:0 auto}
    .month-banner .mb-row{display:grid;grid-template-columns:2fr 1fr;gap:10px;align-items:stretch;background:#d8d6e8;border-bottom:1px solid #888;padding:8px}
    .month-banner .mb-img{display:block;width:100%;height:auto;max-height:150px;object-fit:contain;background:#fff;border:1px solid #888}
    .month-banner .mb-text{display:flex;flex-direction:column;justify-content:center;text-align:center;padding:6px 8px;font-weight:900}
    .month-banner .mb-title{font-size:18px;line-height:1.1;letter-spacing:.2px}
    .month-banner .mb-month{font-size:16px;margin-top:6px}
    .month-banner .mb-cong{font-size:14px;margin-top:6px;font-weight:800}
    .model-block{border-left:1px solid #888;border-right:1px solid #888;border-bottom:1px solid #888}
    .model-block + .model-block{border-top:none}
    .dia-head{
      text-align:center;
      font-weight:900;
      padding:7px 8px;
      border-bottom:1px solid #888;
      letter-spacing:.2px;
      text-transform:capitalize;
    }
    .model-table{width:100%;border-collapse:collapse}
    .model-table td{
      border:1px solid #888;
      padding:4px 6px;
      font-size:12px;
      vertical-align:middle;
    }
    .model-table td.lbl{
      font-weight:800;
      background:#f3f4f6;
      width:18%;
      white-space:nowrap;
    }
    .model-table td.val{width:32%;}
    .model-table td.title{
      text-align:center;
      font-style:italic;
      font-weight:800;
    }

    /* Colores por semana (sutiles) */
    .wk-1 .dia-head{background:#bcd6f1;}
    .wk-2 .dia-head{background:#d6e6f7;}
    .wk-3 .dia-head{background:#cfe9d6;}
    .wk-4 .dia-head{background:#e8d9f2;}

    @media print{
      @page{size:A4 portrait;margin:0;}
      body{background:#fff !important;}
      .topbar,.acciones,button,.no-print{display:none !important;}
      .container{padding:0 !important;}
      .a4-sheet{margin:0 !important;border:none !important;box-shadow:none !important;border-radius:0 !important;}
      .a4-pad{padding:10mm 10mm 12mm !important;}
      .month-banner .mb-img{max-height:120px;}
      .month-banner .mb-title{font-size:16px;}
      .month-banner .mb-month{font-size:14px;}
      .month-banner .mb-cong{font-size:12px;}
      .dia-head{padding:6px 7px;font-size:12px;}
      .model-table td{font-size:11px;line-height:1.15;padding:3px 5px;}
      .model-block{break-inside:avoid;page-break-inside:avoid;}
    }
  
/* ===== IMPRESION EXACTA EN COLOR ===== */
@media print {

  @page {
    size: A4 portrait;
    margin: 0;
  }

  html, body {
    width: 210mm;
    height: 297mm;
    background: #fff !important;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  .topbar,
  .acciones,
  button,
  .no-print {
    display: none !important;
  }

  .container {
    padding: 0 !important;
  }

  .a4-sheet {
    margin: 0 !important;
    border: none !important;
    box-shadow: none !important;
    border-radius: 0 !important;
  }

  .a4-pad {
    padding: 10mm 10mm 12mm !important;
  }

  .model-block {
    break-inside: avoid;
    page-break-inside: avoid;
  }
}

</style>

</head>
<body class="has-topbar">
  <div id="topbar"></div>

  <div class="container">
    <div id="toastHost"></div>


    <div class="a4-shell">
      <div class="card pad no-print">
        <div class="section-title">
          <h2 class="h1" style="margin:0;">Programa mensual</h2>
          <span class="pill">Discursos públicos</span>
        </div>
        <div class="muted desc" style="margin-top:-6px;">Se arma automáticamente con lo que cargaste en <b>Asignaciones</b>.</div>
        <div class="hr"></div>

        <div class="grid two">
          <div class="field">
            <div class="label">Mes</div>
            <input class="input" id="mes" type="month" />
          </div>
          <div class="field">
            <div class="label">Acciones</div>
            <div class="row">
              <button class="btn" id="btnCargar" type="button">Cargar</button>
              <button class="btn primary" id="btnPrint" type="button">Imprimir / PDF</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Hoja A4: lo que se imprime -->
      <div class="a4-sheet">
        <div class="a4-pad">
          <div id="contenido" class="pm-wrap"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function(){
    if(!('serviceWorker' in navigator)) return;
    let refreshing = false;
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('./sw.js').then(function(reg){
        if(reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
        reg.addEventListener('updatefound', function(){
          var nw = reg.installing;
          if(!nw) return;
          nw.addEventListener('statechange', function(){
            if(nw.state === 'installed' && navigator.serviceWorker.controller){
              nw.postMessage({type:'SKIP_WAITING'});
            }
          });
        });
      }).catch(function(e){
        console.log('SW error', e);
      });

      navigator.serviceWorker.addEventListener('controllerchange', function(){
        if(refreshing) return;
        refreshing = true;
        location.reload();
      });
    });
  })();
  </script>
  <script type="module" src="js/pages/programa-mensual.js?v=20260302_2"></script>
  <script src="js/nav-mobile.js"></script>
</body>
</html>
