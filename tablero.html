<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tablero — Planificador VMC</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/board.css" />
</head>
<body>
  <div class="topbar no-print">
    <div class="container nav">
      <div class="brand">
        <span id="appName">Planificador VMC</span>
        <span class="badge" id="appVersion"></span>
        <span class="badge" id="authStatus">—</span>
      </div>
      <div class="navlinks">
        <a href="index.html">Inicio</a>
        <a href="semana.html">Semana</a>
        <a href="personas.html">Personas</a>
        <a href="tablero.html">Tablero</a>
        <a href="settings.html">Configuración</a>
        <a href="login.html">Login</a>
        <button id="btnLogout" class="ghost" style="display:none">Salir</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="row space no-print">
      <div>
        <h2>Tablero</h2>
        <div class="small">Impresión doble de semanas: <b id="weekPretty">—</b></div>
      </div>
      <div class="row">
        <button id="btnPrint" class="secondary">Imprimir</button>
      </div>

    <div id="boardWrap">

        <div class="print-banner">Vida y Ministerio Cristianos · Formato para WhatsApp y tablero</div>
