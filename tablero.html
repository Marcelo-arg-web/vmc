<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tablero — Planificador VMC</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/board.css" />
</head>
<body>
  <div class="topbar no-print">
    <div class="container nav">
      <div class="brand">
        <span id="appName">Planificador VMC</span>
        <span class="badge" id="appVersion"></span>
        <span class="badge" id="authStatus">—</span>
      </div>
      <div class="navlinks">
        <a href="index.html">Inicio</a>
        <a href="semana.html">Semana</a>
        <a href="personas.html">Personas</a>
        <a href="tablero.html">Tablero</a>
        <a href="settings.html">Configuración</a>
        <a href="login.html">Login</a>
        <button id="btnLogout" class="ghost" style="display:none">Salir</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="row space no-print">
      <div>
        <h2>Tablero</h2>
        <div class="small">Semana: <b id="weekPretty">—</b></div>
      </div>
      <div class="row">
        <button id="btnPrint" class="secondary">Imprimir</button>
      </div>
    </div>

    <div id="boardWrap">
      <div id="board">
        <div class="heroStrip">
          <div class="heroTitle">Vida y Ministerio Cristianos</div>
          <div class="heroSub" id="cong">Congr. Villa Fiad</div>
        </div>

        <div class="weekLine">
          <div class="weekDate" id="date">—</div>
          <div class="weekSchedule" id="schedule">—</div>
        </div>

        <div class="songsLine">
          <div><span class="lbl">Lectura bíblica:</span> <span id="reading">—</span></div>
          <div><span class="lbl">Canción inicial:</span> <span id="song1">—</span></div>
          <div><span class="lbl">Canción intermedia:</span> <span id="song2">—</span></div>
          <div><span class="lbl">Canción final:</span> <span id="song3">—</span></div>
        </div>

        <div class="openingRow">
          <div><span class="lbl">Presidente:</span> <span id="pres">—</span></div>
          <div><span class="lbl">Oración inicial:</span> <span id="or1">—</span></div>
          <div><span class="lbl">Oración final:</span> <span id="or2">—</span></div>
        </div>

        <div id="specialBox"></div>
        <div id="partsList"></div>
      </div>
    </div>
  </div>
  <script type="module" src="js/tablero.js"></script>
</body>
</html>
