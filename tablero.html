<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tablero — Planificador VMC</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/board.css" />
</head>
<body>
  <div class="topbar no-print">
    <div class="container nav">
      <div class="brand">
        <span id="appName">Planificador VMC</span>
        <span class="badge" id="appVersion"></span>
        <span class="badge" id="authStatus">—</span>
      </div>
      <div class="navlinks">
        <a href="index.html">Inicio</a>
        <a href="semana.html">Semana</a>
        <a href="personas.html">Personas</a>
        <a href="tablero.html">Tablero</a>
        <a href="settings.html">Configuración</a>
        <a href="login.html">Login</a>
        <button id="btnLogout" class="ghost" style="display:none">Salir</button>
      </div>
    </div>
  </div>

  <div class="container page-wide">
    <div class="row space no-print">
      <div>
        <h2>Hoja para tablero / WhatsApp</h2>
        <div class="small">Se muestran la semana seleccionada y la siguiente.</div>
      </div>
      <div class="row">
        <button id="btnExportImage" class="ghost">Descargar imagen</button>
        <button id="btnPrint" class="secondary">Imprimir</button>
      </div>
    </div>

    <div id="boardWrap">
      <div id="board">
        <div class="board-header">
          <div class="cong" id="cong">CONG.: VILLA FIAD</div>
          <div class="board-title">Programa para la reunión de entre semana</div>
        </div>
        <div id="weeksContainer"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script type="module" src="js/tablero.js"></script>
</body>
</html>
