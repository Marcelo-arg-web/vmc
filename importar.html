<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>Importar · Arreglos Discursos</title>
  <link href="assets/favicon.svg" rel="icon" type="image/svg+xml"/>
  <link href="css/styles.css" rel="stylesheet"/>
</head>
<body class="has-topbar">
  <div id="topbar"></div>
  <div class="container">
    <div id="toastHost"></div>

    <div class="card pad">
      <h2 class="h1" style="margin-bottom:6px;">Importar</h2>
      <div class="muted">Elegí qué querés importar a Firestore.</div>
      <hr class="sep"/>

      <div class="row" style="gap:12px; flex-wrap:wrap;">
        <a class="btn" href="importar-asignaciones.html">Importar Asignaciones.xlsx</a>
        <a class="btn primary" href="importar-visitantes.html">Importar Visitantes (historial)</a>
      </div>

      <div class="small muted" style="margin-top:12px;">
        Consejo: antes de importar, asegurate de estar logueado como Admin/Superadmin.
      </div>
    </div>
  </div>

  <script>
  (function(){
    if(!('serviceWorker' in navigator)) return;
    let refreshing = false;
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('./sw.js').then(function(reg){
        if(reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
        reg.addEventListener('updatefound', function(){
          var nw = reg.installing;
          if(!nw) return;
          nw.addEventListener('statechange', function(){
            if(nw.state === 'installed' && navigator.serviceWorker.controller){
              nw.postMessage({type:'SKIP_WAITING'});
            }
          });
        });
      }).catch(function(e){
        console.log('SW error', e);
      });

      navigator.serviceWorker.addEventListener('controllerchange', function(){
        if(refreshing) return;
        refreshing = true;
        location.reload();
      });
    });
  })();
  </script>

  <script src="js/pages/importar.js?v=20260303" type="module"></script>
  <script src="js/nav-mobile.js"></script>
</body>
</html>
